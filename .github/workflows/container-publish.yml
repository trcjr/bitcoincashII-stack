name: Build and Publish Container

on:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing upstream git tag to build and publish (for example: v27.0.2)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: BitcoincashII/bitcoincashII-core

concurrency:
  group: container-publish
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve target version
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      target_tag: ${{ steps.resolve.outputs.target_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - name: Resolve tag to build
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          should_build=false
          target_tag=""
          checkout_ref=""
          is_release=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            should_build=true
            checkout_ref="$SHA"
            echo "PR build only"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_build=true
            target_tag="$INPUT_TAG"
            checkout_ref="refs/heads/$DEFAULT_BRANCH"
            is_release=true
            echo "Manual release build for upstream tag $target_tag"
          elif [[ "$REF" == refs/tags/v* ]]; then
            should_build=true
            target_tag="$REF_NAME"
            checkout_ref="$REF"
            is_release=true
            echo "Repo tag push release build for tag $target_tag"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            latest_upstream_tag="$(gh api "repos/$UPSTREAM_REPO/tags" --paginate -q '.[].name' | grep '^v' | sort -V | tail -n1 || true)"

            if [ -z "$latest_upstream_tag" ]; then
              echo "Could not determine latest upstream v* tag"
              exit 1
            fi

            if gh release view "$latest_upstream_tag" --repo "$REPO" >/dev/null 2>&1; then
              echo "Upstream tag $latest_upstream_tag already released in this repo; skipping"
              should_build=false
              checkout_ref="refs/heads/$DEFAULT_BRANCH"
            else
              should_build=true
              target_tag="$latest_upstream_tag"
              checkout_ref="refs/heads/$DEFAULT_BRANCH"
              is_release=true
              echo "New upstream tag detected: $target_tag"
            fi
          else
            should_build=true
            checkout_ref="$REF"
            echo "Branch build only"
          fi

          {
            echo "should_build=$should_build"
            echo "target_tag=$target_tag"
            echo "checkout_ref=$checkout_ref"
            echo "is_release=$is_release"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.prepare.outputs.is_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.target_tag }},enable=${{ needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.target_tag != '' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_release == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BITCOINCASHII_REPO_URL=https://github.com/${{ env.UPSTREAM_REPO }}.git
            BITCOINCASHII_REF=${{ needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.target_tag || github.ref_name }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.is_release == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.target_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.prepare.outputs.target_tag }}"
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          latest_image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi

          gh release create "$tag" \
            --title "$tag" \
            --notes "Automated container release for upstream tag $tag

          Published images:
          - \`${image}\`
          - \`${latest_image}\`"